<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliGEM</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="logo">
          <div class="logo-icon">✨</div>
          <div class="logo-text">
            <h1>IntelliGEM</h1>
            <span>Powered by Gemini</span>
          </div>
        </div>
        <button id="settings-btn" class="icon-btn" title="Settings">⚙️</button>
      </header>

      <div id="settings-panel" class="panel hidden">
        <h3 class="panel-title">Settings</h3>
        <div class="form-group">
          <label class="form-label">Gemini API Key</label>
          <div class="input-row">
            <input type="password" id="api-key-input" class="input-field" placeholder="AIza..." />
            <button id="toggle-key-visibility" class="icon-btn-sm">👁</button>
          </div>
          <p class="hint">Get your key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a></p>
        </div>
        <div class="form-group">
          <label class="form-label">Model</label>
          <select id="model-select" class="input-field">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (Fastest)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (Smartest)</option>
            <option value="gemini-pro">Gemini Pro</option>
          </select>
        </div>
        <button id="save-settings-btn" class="btn btn-primary">Save Settings</button>
      </div>

      <div id="main-content">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="chat">💬 Chat</button>
          <button class="tab-btn" data-tab="summarize">📄 Summary</button>
          <button class="tab-btn" data-tab="code">💻 Code</button>
          <button class="tab-btn" data-tab="leetcode">🧩 LeetCode</button>
        </div>

        <div id="tab-chat" class="tab-content active">
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-area">
            <div class="language-select-row">
              <select id="language-select" class="select-sm">
                <option value="en">🇺🇸 English</option>
                <option value="hi">🇮🇳 Hindi</option>
                <option value="es">🇪🇸 Spanish</option>
                <option value="fr">🇫🇷 French</option>
                <option value="de">🇩🇪 German</option>
                <option value="ja">🇯🇵 Japanese</option>
                <option value="zh">🇨🇳 Chinese</option>
                <option value="ar">🇸🇦 Arabic</option>
                <option value="pt">🇧🇷 Portuguese</option>
              </select>
            </div>
            <div class="input-row">
              <textarea id="chat-input" class="chat-textarea" placeholder="Ask me anything..." rows="2"></textarea>
              <button id="send-btn" class="btn-icon-send" title="Send">➤</button>
            </div>
          </div>
        </div>

        <div id="tab-summarize" class="tab-content">
          <div class="feature-card">
            <div class="feature-icon">📄</div>
            <h3>Page Summarizer</h3>
            <p>Get a smart summary of the current page</p>
          </div>
          <button id="summarize-page-btn" class="btn btn-primary full-width">Summarize Current Page</button>
          <div id="summary-result" class="result-area hidden"></div>
        </div>

        <div id="tab-code" class="tab-content">
          <div class="feature-card">
            <div class="feature-icon">💻</div>
            <h3>Code Explainer</h3>
            <p>Paste code below for instant explanation</p>
          </div>
          <textarea id="code-input" class="code-textarea" placeholder="function fibonacci(n) {&#10;  if (n <= 1) return n;&#10;  return fibonacci(n-1) + fibonacci(n-2);&#10;}"></textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button id="explain-code-btn" class="btn btn-primary" style="flex:1">Explain Code</button>
            <button id="optimize-code-btn" class="btn btn-secondary" style="flex:1">Optimize</button>
          </div>
          <div id="code-result" class="result-area hidden"></div>
        </div>

        <div id="tab-leetcode" class="tab-content">
          <div class="feature-card leetcode-card">
            <div class="feature-icon">🧩</div>
            <h3>LeetCode Assistant</h3>
            <p id="leetcode-status">Navigate to a LeetCode problem page</p>
          </div>
          <div id="leetcode-actions" class="hidden">
            <button id="get-hint-btn" class="btn btn-primary full-width">💡 Get a Hint</button>
            <button id="explain-approach-btn" class="btn btn-secondary full-width" style="margin-top:8px">🧠 Explain Approach</button>
            <button id="detect-pattern-btn" class="btn btn-outline full-width" style="margin-top:8px">🔍 Detect Pattern</button>
          </div>
          <div id="leetcode-result" class="result-area hidden"></div>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
